# =============================================================================
# Sprach-agnostischer Security-Scan für ALLE ratwerk-Projekte
# Lives in: ratwerk/.github/.github/workflows/secscan.yml
#
# Läuft unabhängig vom Stack (Next.js, Python, statisch) — kein Build, keine
# npm/pip-Abhängigkeit. Nur:
#   1. gitleaks   – Secret-Detection im aktuellen Baum (regex + entropy, findet
#                   auch hardcodierte Passwörter/Keys)
#   2. Semgrep    – SAST mit p/secrets (z.B. API-Key in URL, geleakte Tokens)
#
# Aufruf pro Repo (.github/workflows/secscan.yml):
#   name: Security Scan
#   on:
#     push: { branches: [main] }
#     pull_request: { branches: [main] }
#   jobs:
#     scan:
#       uses: ratwerk/.github/.github/workflows/secscan.yml@main
#
# False Positives unterdrücken:
#   - gitleaks: Eintrag in .gitleaksignore (Fingerprint aus dem Log)
#   - Semgrep:  Inline-Kommentar  // nosemgrep: <rule-id>
# =============================================================================

name: Security Scan (shared)

on:
  workflow_call:
    inputs:
      semgrep-configs:
        description: 'Space-separated Semgrep rule packs'
        default: 'p/secrets'
        type: string
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Secret detection (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # gitleaks als Binary via Docker – zuverlässiger als die gitleaks-action
      # (die auf User-Accounts an ihrer Lizenz-/Telemetrie-Logik scheitert).
      # "dir" scannt den aktuellen Arbeitsbaum (keine History-Altlasten).
      - name: Run gitleaks
        run: |
          docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:latest \
            dir /repo --redact --verbose --exit-code 1

  semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        run: |
          ARGS=""
          for c in ${{ inputs.semgrep-configs }}; do ARGS="$ARGS --config $c"; done
          semgrep scan $ARGS --error --metrics=off
